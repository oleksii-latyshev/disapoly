version: 2
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    # Let new releases age before proposing them: compromised versions are
    # usually yanked from the registry within days.
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      dev-tooling:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      production:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 5
    labels:
      - 'dependencies'
    groups:
      github-actions:
        patterns:
          - '*'
