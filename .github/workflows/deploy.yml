name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  # Gate: typecheck, lint, and the game-core test suite. Runs on every push
  # and PR; a failure here blocks the deploy job below.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  # Deploys only after checks pass, and never for pull requests.
  deploy:
    needs: check
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run deploy:all
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Not a secret — the client connects to it openly. Hardcoded here.
          VITE_PARTYKIT_HOST: disapoly.disa-67b.workers.dev
