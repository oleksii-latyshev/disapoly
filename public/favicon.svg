<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Neon board mark: the Neon theme's midnight frame, a glowing cyan ring,
       the four corner tiles in neon group colors and a cyan gem center. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181830" />
      <stop offset="1" stop-color="#0b0b16" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7af7ff" />
      <stop offset="1" stop-color="#3d8bff" />
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8fbff" />
      <stop offset="0.55" stop-color="#3df0ff" />
      <stop offset="1" stop-color="#2f7fe0" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#bg)" />
  <rect
    x="2"
    y="2"
    width="28"
    height="28"
    rx="7"
    fill="none"
    stroke="url(#ring)"
    stroke-width="1.4"
    filter="url(#glow)"
  />
  <!-- corner tiles in the Neon theme's group colors -->
  <g filter="url(#glow)">
    <rect x="5.4" y="5.4" width="5.4" height="5.4" rx="1.5" fill="#ff3d5e" />
    <rect x="21.2" y="5.4" width="5.4" height="5.4" rx="1.5" fill="#6b7bff" />
    <rect x="5.4" y="21.2" width="5.4" height="5.4" rx="1.5" fill="#fdf07a" />
    <rect x="21.2" y="21.2" width="5.4" height="5.4" rx="1.5" fill="#3dff8a" />
  </g>
  <!-- center gem -->
  <path
    d="M16 9.6 L22.4 16 L16 22.4 L9.6 16 Z"
    fill="url(#gem)"
    filter="url(#glow)"
  />
  <path d="M16 9.6 L22.4 16 L16 16 Z" fill="#ffffff" opacity="0.35" />
</svg>
